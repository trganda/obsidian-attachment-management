name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

env:
  PLUGIN_NAME: attachment-management

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - name: pnpm
        uses: pnpm/action-setup@v6
      - name: Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: pnpm

      - name: Build Changelog
        id: release_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        id: build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          mkdir ${{ env.PLUGIN_NAME }}
          cp main.js manifest.json styles.css ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip ${{ env.PLUGIN_NAME }}
          ls

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
            ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip

      - name: Release
        id: release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "main.js,manifest.json,styles.css,${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip"
          body: ${{ steps.release_changelog.outputs.changelog }}
